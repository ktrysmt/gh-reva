version: 2
project_name: gh-reva
before:
  hooks:
    - go mod tidy
builds:
  - main: ./
    binary: gh-reva
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/ktrysmt/gh-reva/cmd.version={{.Version}}
      - -X github.com/ktrysmt/gh-reva/cmd.commit={{.Commit}}
      - -X github.com/ktrysmt/gh-reva/cmd.date={{.Date}}
archives:
  - formats: [binary]
    # gh CLI matches release assets by `strings.HasSuffix(name, "<os>-<arch>")`
    # (cli/cli pkg/cmd/extension/manager.go), so the OS-Arch portion MUST use
    # a hyphen. An underscore here makes `gh extension install` fail with
    # "no usable release artifact". Keep the leading `_` between binary name
    # and OS so disambiguation against checksums.txt stays readable.
    name_template: "{{ .Binary }}_{{ .Os }}-{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
release:
  draft: false
  prerelease: auto
